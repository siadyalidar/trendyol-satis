<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siparişler — SoftHydra</title>
<style>
  :root {
    --ty-orange: #f27a1a;
    --ty-orange-dark: #d9660c;
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --text-main: #1f2430;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --green: #16a34a;
    --red: #dc2626;
    --amber: #b45309;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-main);
  }
  header {
    background: linear-gradient(135deg, var(--ty-orange), var(--ty-orange-dark));
    color: white;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  header .sub { font-size: 13px; opacity: 0.9; margin-top: 2px; }
  header nav a {
    color: white; text-decoration: none; font-size: 13.5px; opacity: 0.9;
    margin-right: 16px; border-bottom: 1px solid transparent;
  }
  header nav a:hover { border-bottom-color: white; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  select, input, button {
    font-family: inherit; font-size: 14px; padding: 8px 14px;
    border-radius: 8px; border: none;
  }
  select, input { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4); }
  select option { color: #1f2430; }
  input::placeholder { color: rgba(255,255,255,0.75); }
  button { cursor: pointer; }
  button.primary { background: white; color: var(--ty-orange-dark); font-weight: 600; }
  button.primary:hover { background: #fff4ea; }

  main { padding: 24px 28px 60px; max-width: 1200px; margin: 0 auto; }

  #error-banner {
    display: none;
    background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
    padding: 12px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px;
  }

  .panel {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 24px;
  }
  .panel h2 { font-size: 15px; margin: 0 0 4px; }
  .panel .panel-note { font-size: 12.5px; color: var(--text-muted); margin: 0 0 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-muted); font-weight: 600; }
  tr.order-row { cursor: pointer; }
  tr.order-row:hover { background: #fafafa; }
  tr.order-row td:first-child { width: 18px; color: var(--text-muted); }

  tr.detail-row { display: none; }
  tr.detail-row.open { display: table-row; }
  tr.detail-row td { background: #fafbfc; padding: 0; }
  .detail-inner { padding: 12px 16px 16px 34px; }
  .detail-inner table { font-size: 12.5px; }
  .detail-inner th, .detail-inner td { padding: 6px 8px; border-bottom: 1px solid #eee; }

  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600;
  }
  .pill-delivered { background: #dcfce7; color: #166534; }
  .pill-cancelled { background: #fee2e2; color: #991b1b; }
  .pill-other { background: #e5e7eb; color: #374151; }

  .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; font-size: 13px; color: var(--text-muted); }
  .pagination button { background: white; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }

  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  footer { text-align: center; color: var(--text-muted); font-size: 12.5px; padding: 20px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📦 Siparişler</h1>
    <div class="sub" id="env-label">Bağlanılıyor…</div>
    <nav style="margin-top:8px;">
      <a href="/">Satış Paneli</a>
      <a href="/dashboard">Kâr/Zarar Paneli</a>
    </nav>
  </div>
  <div class="controls">
    <input type="text" id="search-input" placeholder="Sipariş no / müşteri ara…">
    <select id="status-select">
      <option value="">Tüm Durumlar</option>
      <option value="Delivered">Teslim Edildi</option>
      <option value="Shipped">Kargoda</option>
      <option value="Created">Oluşturuldu</option>
      <option value="Picking">Hazırlanıyor</option>
      <option value="Cancelled">İptal</option>
      <option value="UnSupplied">Karşılanamadı</option>
      <option value="Returned">İade</option>
    </select>
    <select id="range-select">
      <option value="7">Son 7 gün</option>
      <option value="14">Son 14 gün</option>
      <option value="30" selected>Son 30 gün</option>
      <option value="60">Son 60 gün</option>
      <option value="90">Son 90 gün</option>
      <option value="all">Tüm Zamanlar</option>
    </select>
  </div>
</header>

<main>

  <div id="error-banner"></div>

  <div class="panel">
    <h2>Sipariş Listesi</h2>
    <p class="panel-note" id="result-note">Yükleniyor…</p>

    <div id="loading" class="loading">Siparişler yükleniyor…</div>

    <div id="table-wrap" style="display:none;">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Tarih</th>
            <th>Sipariş No</th>
            <th>Müşteri</th>
            <th>Durum</th>
            <th>Kargo</th>
            <th>Net Tutar</th>
          </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination" style="display:none;">
      <span id="page-info"></span>
      <div>
        <button id="prev-btn">← Önceki</button>
        <button id="next-btn">Sonraki →</button>
      </div>
    </div>
  </div>

</main>

<footer>Trendyol Satış Paneli — Siparişler</footer>

<script>
let currentPage = 1;
const PAGE_SIZE = 50;

function fmtTL(n) {
  if (n === null || n === undefined) return '—';
  return '₺' + Number(n).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
}

function statusPill(status) {
  const map = {
    Delivered: ['pill-delivered', 'Teslim Edildi'],
    Cancelled: ['pill-cancelled', 'İptal'],
    UnSupplied: ['pill-cancelled', 'Karşılanamadı'],
  };
  const [cls, label] = map[status] || ['pill-other', status || '—'];
  return `<span class="pill ${cls}">${label}</span>`;
}

function rangeQueryParam() {
  const val = document.getElementById('range-select').value;
  return val === 'all' ? 'full_history=true' : `days=${val}`;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

async function checkConfig() {
  const res = await fetch('/api/config-status');
  const data = await res.json();
  document.getElementById('env-label').textContent = `Ortam: ${data.env} · Satıcı ID: ${data.supplier_id}`;
  return true;
}

async function loadOrders(page) {
  currentPage = page || 1;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('table-wrap').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  hideError();

  const rangeParam = rangeQueryParam();
  const status = document.getElementById('status-select').value;
  const q = document.getElementById('search-input').value.trim();

  const params = new URLSearchParams();
  rangeParam.split('&').forEach(p => { const [k, v] = p.split('='); params.set(k, v); });
  params.set('page', currentPage);
  params.set('page_size', PAGE_SIZE);
  if (status) params.set('status', status);
  if (q) params.set('q', q);

  try {
    const res = await fetch(`/api/orders?${params.toString()}`);
    const data = await res.json();
    if (data.error) { showError(data.error); document.getElementById('loading').style.display = 'none'; return; }

    renderOrders(data.orders);
    document.getElementById('result-note').textContent =
      `${data.start_date} — ${data.end_date} arası, toplam ${data.total} sipariş bulundu.`;
    renderPagination(data.total, data.page, data.page_size);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-wrap').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    showError('Beklenmeyen bir hata oluştu: ' + e.message);
  }
}

function renderOrders(orders) {
  const tbody = document.getElementById('orders-tbody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:24px;">Bu aralıkta sipariş bulunamadı.</td></tr>`;
    return;
  }

  tbody.innerHTML = orders.map((o, i) => `
    <tr class="order-row" data-idx="${i}">
      <td>▸</td>
      <td>${fmtDate(o.orderDate)}</td>
      <td>${o.orderNumber || '—'}</td>
      <td>${o.customer || '—'}</td>
      <td>${statusPill(o.status)}</td>
      <td>${o.cargoProvider || '—'}</td>
      <td>${fmtTL(o.netAmount)}</td>
    </tr>
    <tr class="detail-row" id="detail-${i}">
      <td colspan="7">
        <div class="detail-inner">
          ${renderLines(o.lines)}
        </div>
      </td>
    </tr>
  `).join('');

  tbody.querySelectorAll('tr.order-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = row.dataset.idx;
      const detail = document.getElementById(`detail-${idx}`);
      const arrow = row.querySelector('td:first-child');
      detail.classList.toggle('open');
      arrow.textContent = detail.classList.contains('open') ? '▾' : '▸';
    });
  });
}

function renderLines(lines) {
  if (!lines || !lines.length) {
    return '<div style="color:var(--text-muted); font-size:12.5px;">Satır detayı yok.</div>';
  }
  return `
    <table>
      <thead>
        <tr><th>SKU</th><th>Ürün</th><th>Adet</th><th>Birim Fiyat</th><th>Komisyon %</th></tr>
      </thead>
      <tbody>
        ${lines.map(ln => `
          <tr>
            <td>${ln.merchantSku || '—'}</td>
            <td>${ln.productName || '—'}</td>
            <td>${ln.quantity ?? '—'}</td>
            <td>${fmtTL(ln.lineUnitPrice)}</td>
            <td>${ln.commissionRate ?? '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderPagination(total, page, pageSize) {
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const el = document.getElementById('pagination');
  if (total <= pageSize) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  document.getElementById('page-info').textContent = `Sayfa ${page} / ${totalPages}`;
  document.getElementById('prev-btn').disabled = page <= 1;
  document.getElementById('next-btn').disabled = page >= totalPages;
}

document.getElementById('prev-btn').addEventListener('click', () => { if (currentPage > 1) loadOrders(currentPage - 1); });
document.getElementById('next-btn').addEventListener('click', () => loadOrders(currentPage + 1));
document.getElementById('range-select').addEventListener('change', () => loadOrders(1));
document.getElementById('status-select').addEventListener('change', () => loadOrders(1));

let searchTimeout;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => loadOrders(1), 400);
});

checkConfig();
loadOrders(1);
</script>

</body>
</html>
